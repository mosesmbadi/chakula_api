services:
  redis:
    image: redis:7-alpine
    container_name: chakula_redis_local
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata_local:/data
    networks:
      - chakula_local_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: chakula_api_local
    restart: unless-stopped
    env_file: .env.local
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chakula_local_net
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  redisdata_local:

networks:
  chakula_local_net:
    driver: bridge
