services:
  redis:
    image: redis:7-alpine
    container_name: chakula_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - chakula_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: chakula_api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      REDIS_HOST: 192.168.100.46
      REDIS_PORT: 6379
      KNOWLEDGE_BASE_URL: http://192.168.100.46:8000
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chakula_net
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  redisdata:

networks:
  chakula_net:
    driver: bridge
